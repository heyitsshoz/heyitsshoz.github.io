    <!-- Main Content -->

    <script>
        const canvas = document.getElementById('cs-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let grid = [];
        const cellSize = 12; // Slightly larger cells look cleaner
        let cols, rows;
        let mouseX = -1000, mouseY = -1000;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            width = canvas.width;
            height = canvas.height;
            cols = Math.floor(width / cellSize);
            rows = Math.floor(height / cellSize);
            // Initialize with random noise
            grid = new Array(cols).fill(null).map(() => new Array(rows).fill(0).map(() => Math.random() > 0.85 ? 1 : 0));
        }

        let lastTime = 0;
        function animate(time) {
            requestAnimationFrame(animate);
            if (time - lastTime < 80) return; // limit to ~12 fps for clear cellular steps
            lastTime = time;

            // Fade background for trails
            ctx.fillStyle = 'rgba(20, 19, 19, 0.4)';
            ctx.fillRect(0, 0, width, height);

            let next = new Array(cols).fill(null).map(() => new Array(rows).fill(0));

            for (let i = 0; i < cols; i++) {
                for (let j = 0; j < rows; j++) {
                    let state = grid[i][j];
                    let neighbors = sumNeighbors(grid, i, j);
                    
                    // Conway's Rules
                    if (state == 0 && neighbors == 3) {
                        next[i][j] = 1;
                    } else if (state == 1 && (neighbors < 2 || neighbors > 3)) {
                        next[i][j] = 0;
                    } else {
                        next[i][j] = state;
                    }

                    // Draw alive cells
                    if (next[i][j] == 1) {
                        // Highlight some cells randomly in amber
                        ctx.fillStyle = (Math.random() > 0.95) ? 'rgba(229, 181, 103, 0.7)' : 'rgba(141, 153, 174, 0.4)';
                        ctx.fillRect(i * cellSize + 1, j * cellSize + 1, cellSize - 2, cellSize - 2);
                    }
                }
            }
            grid = next;
            
            // Randomly inject life to keep the simulation going infinitely
            if (Math.random() > 0.6) {
                let rx = Math.floor(Math.random() * cols);
                let ry = Math.floor(Math.random() * rows);
                grid[rx][ry] = 1;
                grid[(rx+1)%cols][ry] = 1;
                grid[rx][(ry+1)%rows] = 1;
            }

            // Mouse interaction: spawn life near cursor
            if (mouseX > 0 && mouseY > 0 && Math.random() > 0.2) {
                let mx = Math.floor(mouseX / cellSize);
                let my = Math.floor(mouseY / cellSize);
                if (mx > 0 && mx < cols-1 && my > 0 && my < rows-1) {
                    grid[mx][my] = 1;
                    if(Math.random() > 0.5) grid[mx+1][my] = 1;
                    if(Math.random() > 0.5) grid[mx-1][my+1] = 1;
                }
            }
        }

        function sumNeighbors(g, x, y) {
            let sum = 0;
            for (let i = -1; i < 2; i++) {
                for (let j = -1; j < 2; j++) {
                    let col = (x + i + cols) % cols;
                    let row = (y + j + rows) % rows;
                    sum += g[col][row];
                }
            }
            sum -= g[x][y];
            return sum;
        }

        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        // Reset mouse when it leaves screen
        window.addEventListener('mouseout', () => {
            mouseX = -1000;
            mouseY = -1000;
        });

        resize();
        requestAnimationFrame(animate);
    </script>
</body>
