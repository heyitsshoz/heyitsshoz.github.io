    <script>
        const canvas = document.getElementById('prose-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let lines = [];
        let time = 0;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            width = canvas.width;
            height = canvas.height;
            initLines();
        }

        function initLines() {
            lines = [];
            const spacing = window.innerWidth < 768 ? 60 : 40;
            const numLines = Math.floor(height / spacing);
            for (let i = 0; i < numLines; i++) {
                lines.push({
                    y: i * spacing + (window.innerWidth < 768 ? 160 : 40),
                    text: "",
                    targetLen: Math.floor(Math.random() * (width / (window.innerWidth < 768 ? 25 : 15))),
                    isRedacted: Math.random() > 0.8
                });
            }
        }

        const chars = "abcdefghijklmnopqrstuvwxyz   .,";
        function animate() {
            time++;
            requestAnimationFrame(animate);
            if (time % 3 !== 0) return; // slower fps

            ctx.clearRect(0, 0, width, height);
            ctx.font = '16px "JetBrains Mono"';
            ctx.textBaseline = 'middle';

            lines.forEach(l => {
                if (l.text.length < l.targetLen && Math.random() > 0.5) {
                    l.text += chars[Math.floor(Math.random() * chars.length)];
                } else if (l.text.length >= l.targetLen && Math.random() > 0.98) {
                    l.text = ""; // clear and restart
                    l.targetLen = Math.floor(Math.random() * (width / 15));
                    l.isRedacted = Math.random() > 0.8;
                }

                if (Math.random() > 0.99) l.isRedacted = !l.isRedacted; // glitch redaction

                ctx.fillStyle = 'rgba(141, 153, 174, 0.4)';
                let x = 50;
                ctx.fillText(l.text + (Math.random() > 0.5 ? "_" : ""), x, l.y);

                if (l.isRedacted && l.text.length > 0) {
                    // Use solid black to "erase" with mix-blend-screen
                    ctx.fillStyle = 'rgba(0, 0, 0, 1)';
                    let w = ctx.measureText(l.text).width;
                    ctx.fillRect(x, l.y - 10, w, 20);
                }
            });
        }
        window.addEventListener('resize', resize);
        
        // Hamburger menu
        const hamburger = document.getElementById('hamburger');
        const mobileMenu = document.getElementById('mobile-menu');
        const bar1 = document.getElementById('bar1'), bar2 = document.getElementById('bar2'), bar3 = document.getElementById('bar3');
        if (hamburger) {
            hamburger.addEventListener('click', () => {
                const isOpen = mobileMenu.classList.toggle('open');
                hamburger.setAttribute('aria-expanded', isOpen);
                bar1.style.transform = isOpen ? 'translateY(6px) rotate(45deg)' : '';
                bar2.style.opacity = isOpen ? '0' : '1';
                bar3.style.transform = isOpen ? 'translateY(-6px) rotate(-45deg)' : '';
                bar3.style.width = isOpen ? '1.5rem' : '1rem';
            });
            document.querySelectorAll('#mobile-menu a').forEach(a => a.addEventListener('click', () => mobileMenu.classList.remove('open')));
        }
        
        resize();
        animate();
    </script>
