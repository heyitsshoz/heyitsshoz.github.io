    <script>
        const canvas = document.getElementById('math-canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let nodes = [];
        let mouseX = -1000;
        let mouseY = -1000;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            width = canvas.width;
            height = canvas.height;

            nodes = [];
            const nodeCount = Math.floor((width * height) / (width < 768 ? 12000 : 9000));
            for (let i = 0; i < nodeCount; i++) {
                nodes.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: (Math.random() - 0.5) * 0.6,
                    vy: (Math.random() - 0.5) * 0.6,
                    radius: Math.random() * 1.5 + 0.8
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);

            nodes.forEach(node => {
                node.x += node.vx;
                node.y += node.vy;
                if (node.x < 0 || node.x > width) node.vx *= -1;
                if (node.y < 0 || node.y > height) node.vy *= -1;
            });

            ctx.lineWidth = 1;
            for (let i = 0; i < nodes.length; i++) {
                for (let j = i + 1; j < nodes.length; j++) {
                    const dx = nodes[i].x - nodes[j].x;
                    const dy = nodes[i].y - nodes[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 180) {
                        ctx.strokeStyle = `rgba(255, 255, 255, ${0.25 * (1 - dist / 180)})`;
                        ctx.beginPath();
                        ctx.moveTo(nodes[i].x, nodes[i].y);
                        ctx.lineTo(nodes[j].x, nodes[j].y);
                        ctx.stroke();
                    }
                }

                const mdx = nodes[i].x - mouseX;
                const mdy = nodes[i].y - mouseY;
                const mdist = Math.sqrt(mdx * mdx + mdy * mdy);
                if (mdist < 300) {
                    ctx.strokeStyle = `rgba(229, 181, 103, ${0.6 * (1 - mdist / 300)})`;
                    ctx.beginPath();
                    ctx.moveTo(nodes[i].x, nodes[i].y);
                    ctx.lineTo(mouseX, mouseY);
                    ctx.stroke();
                }
            }

            nodes.forEach(node => {
                ctx.fillStyle = `rgba(255, 255, 255, ${0.4 + Math.random() * 0.6})`;
                ctx.beginPath();
                ctx.arc(node.x, node.y, node.radius, 0, Math.PI * 2);
                ctx.fill();
            });

            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });
        window.addEventListener('touchmove', (e) => { mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY; }, { passive: true });
        window.addEventListener('mouseout', () => { mouseX = -1000; mouseY = -1000; });
        window.addEventListener('touchend', () => { mouseX = -1000; mouseY = -1000; });

        // Hamburger menu
        const hamburger = document.getElementById('hamburger');
        const mobileMenu = document.getElementById('mobile-menu');
        const bar1 = document.getElementById('bar1'), bar2 = document.getElementById('bar2'), bar3 = document.getElementById('bar3');
        if (hamburger) {
            hamburger.addEventListener('click', () => {
                const isOpen = mobileMenu.classList.toggle('open');
                hamburger.setAttribute('aria-expanded', isOpen);
                bar1.style.transform = isOpen ? 'translateY(6px) rotate(45deg)' : '';
                bar2.style.opacity = isOpen ? '0' : '1';
                bar3.style.transform = isOpen ? 'translateY(-6px) rotate(-45deg)' : '';
                bar3.style.width = isOpen ? '1.5rem' : '1rem';
            });
            document.querySelectorAll('#mobile-menu a').forEach(a => a.addEventListener('click', () => mobileMenu.classList.remove('open')));
        }

        resize();
        animate();
    </script>
