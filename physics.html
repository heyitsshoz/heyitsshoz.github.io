    <script>
        const canvas = document.getElementById('quantum-canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let time = 0;
        let mouseX = -1000;
        let mouseY = -1000;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            width = canvas.width;
            height = canvas.height;
        }

        function animate() {
            ctx.fillStyle = 'rgba(20, 19, 19, 0.15)';
            ctx.fillRect(0, 0, width, height);

            time += 0.02;

            const spacing = 35;
            const rows = Math.floor(height / spacing) + 1;
            const cols = Math.floor(width / spacing) + 1;

            for (let y = 0; y <= rows; y++) {
                for (let x = 0; x <= cols; x++) {
                    const px = x * spacing;
                    const py = y * spacing;

                    // Dual wave source interference (double-slit style)
                    const src1X = width / 3;
                    const src1Y = height / 2;
                    const src2X = 2 * width / 3;
                    const src2Y = height / 2;

                    const d1 = Math.sqrt((px - src1X) ** 2 + (py - src1Y) ** 2);
                    const d2 = Math.sqrt((px - src2X) ** 2 + (py - src2Y) ** 2);

                    const wave1 = Math.sin(d1 * 0.04 - time);
                    const wave2 = Math.sin(d2 * 0.04 - time);
                    const interference = wave1 + wave2;

                    // Mouse interaction
                    const mdx = px - mouseX;
                    const mdy = py - mouseY;
                    const distToMouse = Math.sqrt(mdx * mdx + mdy * mdy);
                    let mousePull = 0;
                    if (distToMouse < 250) {
                        mousePull = Math.sin((250 - distToMouse) * 0.05) * 12;
                    }

                    const offsetX = Math.cos(time + interference) * 12 + (mdx / distToMouse || 0) * mousePull;
                    const offsetY = Math.sin(time + interference) * 12 + (mdy / distToMouse || 0) * mousePull;

                    // Golden highlight for high amplitude nodes, steel blue for low
                    const intensity = Math.abs(interference) / 2;
                    if (intensity > 0.8) {
                        ctx.fillStyle = `rgba(229, 181, 103, ${0.1 + intensity * 0.4})`; // highlight-amber
                    } else {
                        ctx.fillStyle = `rgba(141, 153, 174, ${0.1 + intensity * 0.3})`; // krea-accent
                    }

                    ctx.beginPath();
                    ctx.arc(px + offsetX, py + offsetY, 1.5 + intensity * 2, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        resize();
        animate();
    </script>
