    <!-- Main Content -->

            <article class="prose prose-invert prose-lg font-body-reading text-on-surface-variant/90 leading-relaxed">
                <p class="font-data-mono text-sm tracking-widest opacity-70">

                </p>
            </article>
        </div>
    </main>

    <script>
        const canvas = document.getElementById('prose-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let lines = [];
        let time = 0;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            width = canvas.width;
            height = canvas.height;
            initLines();
        }

        function initLines() {
            lines = [];
            const numLines = Math.floor(height / 40);
            for(let i=0; i<numLines; i++) {
                lines.push({
                    y: i * 40 + 20,
                    text: "",
                    targetLen: Math.floor(Math.random() * (width/15)),
                    isRedacted: Math.random() > 0.8
                });
            }
        }

        const chars = "abcdefghijklmnopqrstuvwxyz   .,";
        function animate() {
            time++;
            requestAnimationFrame(animate);
            if (time % 3 !== 0) return; // slower fps

            ctx.clearRect(0, 0, width, height);
            ctx.font = '16px "JetBrains Mono"';
            ctx.textBaseline = 'middle';

            lines.forEach(l => {
                if (l.text.length < l.targetLen && Math.random() > 0.5) {
                    l.text += chars[Math.floor(Math.random() * chars.length)];
                } else if (l.text.length >= l.targetLen && Math.random() > 0.98) {
                    l.text = ""; // clear and restart
                    l.targetLen = Math.floor(Math.random() * (width/15));
                    l.isRedacted = Math.random() > 0.8;
                }

                if (Math.random() > 0.99) l.isRedacted = !l.isRedacted; // glitch redaction

                ctx.fillStyle = 'rgba(141, 153, 174, 0.4)';
                let x = 50;
                ctx.fillText(l.text + (Math.random()>0.5 ? "_" : ""), x, l.y);

                if (l.isRedacted && l.text.length > 0) {
                    ctx.fillStyle = 'rgba(20, 19, 19, 0.9)';
                    let w = ctx.measureText(l.text).width;
                    ctx.fillRect(x, l.y - 10, w, 20);
                }
            });
        }
        window.addEventListener('resize', resize);
        resize();
        animate();
    </script>
